# ================================================
# GitHub Actions — CI Pipeline
# ================================================
name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # -----------------------------------------------
  # JOB 1: Lint
  # -----------------------------------------------
  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-dev-${{ hashFiles('requirements-dev.txt') }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Jalankan flake8
        run: flake8 .

      - name: Jalankan black check
        run: black --check .

  # -----------------------------------------------
  # JOB 2: Test
  # -----------------------------------------------
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies untuk audio
        run: sudo apt-get install -y libportaudio2 libportaudio-dev

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Buat dummy GCP credentials untuk test
        run: |
          echo '{
            "type": "service_account",
            "project_id": "test-project",
            "private_key_id": "dummy",
            "private_key": "dummy",
            "client_email": "test@test-project.iam.gserviceaccount.com",
            "client_id": "123456",
            "auth_uri": "https://accounts.google.com/o/oauth2/auth",
            "token_uri": "https://oauth2.googleapis.com/token"
          }' > gcp-service-account.json

      - name: Buat dummy GCP credentials untuk test
        run: |
          echo '{
            "type": "service_account",
            "project_id": "test-project",
            "private_key_id": "test",
            "private_key": "-----BEGIN RSA PRIVATE KEY-----\nMIIEowIBAAKCAQEA2a2rwplBQLzHPZe5RJr9vOmSmLFqPUL9HfSjSVJkv2CxvmNa\nAAAA\n-----END RSA PRIVATE KEY-----\n",
            "client_email": "test@test-project.iam.gserviceaccount.com",
            "client_id": "123456",
            "auth_uri": "https://accounts.google.com/o/oauth2/auth",
            "token_uri": "https://oauth2.googleapis.com/token",
            "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
            "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/test"
          }' > gcp-service-account.json

      - name: Jalankan pytest
        run: pytest tests/ -v --tb=short